<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPARK Admin App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-mark">S</div><div><strong>SPARK</strong><span>Admin Console</span></div></div>
        <div class="mode-switch" aria-label="관리 영역 선택"><button class="mode-button active" data-mode="admin">운영팀</button><button class="mode-button" data-mode="partner">업체</button></div>
        <nav class="nav-list" id="navList" aria-label="주 메뉴"></nav>
        <div class="sidebar-card" id="priorityCard"><span class="mini-label">오늘의 우선 처리</span><strong>승인 대기 18건</strong><p>서비스 7건, 장소 5건, 콘텐츠 6건</p></div>
      </aside>
      <main class="main">
        <header class="topbar"><div><p class="eyebrow" id="routeEyebrow">Admin</p><h1 id="pageTitle">운영 현황 대시보드</h1></div><div class="topbar-actions"><label class="search"><span>검색</span><input id="globalSearch" type="search" placeholder="현재 화면에서 검색" /></label><button class="ghost-button" id="notifyButton">알림 4</button><button class="primary-button" id="quickAction">빠른 작업</button></div></header>
        <section class="content" id="content"></section>
      </main>
    </div>
    <div class="modal-backdrop" id="modalBackdrop" hidden><section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal-header"><div><p class="eyebrow" id="modalEyebrow">상세 보기</p><h2 id="modalTitle">항목 상세</h2></div><button class="icon-button" id="closeModal" aria-label="닫기">×</button></div><div id="modalBody"></div><div class="modal-actions" id="modalActions"></div></section></div>
    <script src="./app.js"></script>
  </body>
</html>
